<div class="dialog-overlay" *ngIf="show" (click)="onOverlayClick()">
  <div class="dialog-container" (click)="onDialogClick($event)">
    <div class="dialog-header">
      <!-- <h2>Get Started - {{ data.courseTitle }}</h2> -->
       <h2 style="text-align: center;">Student Details</h2>
      <button class="close-btn" (click)="onCancel()">×</button>
    </div>

    <div class="dialog-content">
      <p class="dialog-description">
        Please provide your details to start learning {{ data.courseTitle }}
      </p>

      <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="student-form">
        <div class="form-group">
          <label for="studentName">Student Name</label>
          <input 
            type="text" 
            id="studentName"
            class="form-input"
            placeholder="Enter student name" 
            formControlName="studentName"
            required>
          <div class="error-message" *ngIf="getStudentNameErrorMessage()">
            {{ getStudentNameErrorMessage() }}
          </div>
        </div>

        <div class="form-group">
          <label for="mobileNumber">Mobile Number</label>
          <input 
            type="tel" 
            id="mobileNumber"
            class="form-input"
            placeholder="Enter 10-digit mobile number" 
            formControlName="mobileNumber"
            maxlength="10"
            required>
          <div class="error-message" *ngIf="getMobileNumberErrorMessage()">
            {{ getMobileNumberErrorMessage() }}
          </div>
        </div>
      </form>
    </div>

    <div class="dialog-actions">
      <button class="cancel-btn" (click)="onCancel()">
        Cancel
      </button>
      <button 
        class="submit-btn" 
        (click)="onSubmit()" 
        [disabled]="!studentForm.valid">
        Submit
      </button>
    </div>
  </div>
</div>
