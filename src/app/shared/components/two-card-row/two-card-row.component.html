<div class="two-card-row-container">
  <!-- Single Row with 2 Cards - Image Format Design -->
  <div class="cards-row">
    <!-- Dynamic Cards -->
    <div class="dynamic-card" *ngFor="let card of cards">
      <div class="card-image">
        <img [src]="card.image" [alt]="card.title">
      </div>
      <div class="card-content">
        <h3>{{ card.title }}</h3>
        <p>{{ card.description }}</p>
        <button class="card-btn" (click)="onCardClick(card.id)">
          {{ card.buttonText }}
        </button>
      </div>
    </div>
  </div>
</div>
