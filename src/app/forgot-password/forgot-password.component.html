<div class="main-container">
  <div class="content-wrapper">
    <!-- Left Panel - Illustration -->
    <div class="left-panel">
      <div class="illustration-container">
        <div class="forgot-password-illustration">
          <div class="lock-icon">🔒</div>
          <h2>Forgot Password?</h2>
          <p>Don't worry! We'll help you reset your password and get back to your account.</p>
        </div>
      </div>
    </div>

    <!-- Right Panel - Forgot Password Form -->
    <div class="right-panel">
      <div class="form-card">
        <div class="form-header">
          <div class="header-image-container">
            <div class="lock-icon-small">🔐</div>
          </div>
          <h1 class="form-title">Reset Password</h1>
          <p class="form-subtitle">Enter your email address and we'll send you a reset link</p>
        </div>

        <form class="forgot-password-form" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input"
              placeholder="Enter your email address"
              formControlName="email"
            />
            <div class="error-message" *ngIf="getEmailErrorMessage()">
              {{ getEmailErrorMessage() }}
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="isLoading">
            <span *ngIf="!isLoading">Send Reset Link</span>
            <span *ngIf="isLoading">Sending...</span>
          </button>
        </form>

        <div class="form-footer">
          <button type="button" class="back-to-login-btn" (click)="backToLogin()">
            ← Back to Login
          </button>
        </div>

        <div class="privacy-note">
          <span class="icon">🔒</span>
          <span>Your information is secure and will never be shared</span>
        </div>
      </div>
    </div>
  </div>
</div>
